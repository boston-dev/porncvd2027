<script>
    var lazyload = new LazyLoad({
        elements_selector: '.lazyload',
        class_loading: 'lazy-loading',
        class_loaded: 'lazy-loaded',
        attr_to_webp: 'data-not-to-webp',
        //parentLoadingClass: LOADING_PARENT_CLASS,
        callback_error: function (el) {
            // 背景图不存在不触发此回调
            var src = el.getAttribute('data-src').replace(/\.webp/gi, '');
            if (el.tagName === 'IMG') {
                el.setAttribute('src', src);
            }
        }
    });
</script>

<script>
  $(function () {
    var repeatTimes = 2;
    var hasLoaded = false;
    var scrollTimer = null;
    var fallbackTimer = null;

    // 统一触发，只执行一次
    function triggerLoadAds() {
      if (hasLoaded) return;
      hasLoaded = true;

      $(window).off('scroll', onScroll);
      if (fallbackTimer) {
        clearTimeout(fallbackTimer);
        fallbackTimer = null;
      }

      loadAds();
    }

    // 滚动触发
    function onScroll() {
      if (hasLoaded) return;

      clearTimeout(scrollTimer);
      scrollTimer = setTimeout(function () {
        var scrollTop = $(window).scrollTop();
        var windowHeight = $(window).height();
        var docHeight = $(document).height();

        var percent = (scrollTop + windowHeight) / docHeight;

        // 滚动到 35% 触发
        if (percent >= 0.35) {
          triggerLoadAds();
        }
      }, 80);
    }

    $(window).on('scroll', onScroll);

    // 停留时间兜底：4 秒后还没触发就请求
    fallbackTimer = setTimeout(function () {
      triggerLoadAds();
    }, 1800);
    function getDeviceType() {
      const ua = navigator.userAgent;

      if (/Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua)) {
        return "Mobile";
      }

      return "Desktop";
    }
    function filterAdsByDevice(list) {
      const device = getDeviceType();

      return list.filter(ad => {
        // 没有 type → 通用广告
        if (!ad.type) return true;

        // 有 type → 必须匹配设备
        return ad.type === device;
      });
    }
    function loadAds () {
      $.ajax({
        url: 'https://v.viet123.tv/api/snippets',
        data:{},
        type: 'GET',
        dataType: 'json',
        success: function (data) {
          var listTop = data.listTop || [];
          var listBtm = data.listBtm || [];
          var listLeft = data.listLeft || [];
          var usList=filterAdsByDevice(data.usList || []);
          repeatTimes = data.repeatTimes || repeatTimes;

          if (Array.isArray(listTop) && listTop.length) {
            rotateAds({ list: listTop, pos: 'top', repeatTimes: repeatTimes });
          }

          if (Array.isArray(listBtm) && listBtm.length) {
            rotateAds({ list: listBtm, pos: 'btm', repeatTimes: repeatTimes });
          }

          if (Array.isArray(listLeft) && listLeft.length) {
            rotateAds({ list: listLeft, pos: 'left', repeatTimes: repeatTimes });
          }
          if (Array.isArray(usList) && usList.length) {
            rotateAdsUs({ list: usList, pos: 'uscode', repeatTimes: 1 });
          }
        },
        error: function (xhr) {
          console.error('加载广告列表失败', xhr);
        }
      });
    }

    function rotateAds (options) {
      var list = options.list;
      var pos = options.pos;
      var repeatTimes = options.repeatTimes;

      var keyIndex = 'snippet_index_' + pos;
      var keyShown = 'snippet_shown_' + pos;

      var idx = parseInt(localStorage.getItem(keyIndex), 10);
      var shown = parseInt(localStorage.getItem(keyShown), 10);

      if (isNaN(idx) || idx >= list.length) idx = 0;
      if (isNaN(shown) || shown < 0) shown = 0;

      var src = list[idx];

      $('script[data-ad="' + pos + '"]').remove();

      $('<script>', {
        src: src,
        async: true,
        'data-ad': pos
      }).appendTo('body');

      shown += 1;

      if (shown >= repeatTimes) {
        shown = 0;
        idx = (idx + 1) % list.length;
      }

      localStorage.setItem(keyIndex, idx);
      localStorage.setItem(keyShown, shown);
    }
    function rotateAdsUs (options) {
      var list = options.list.filter(function(d){
        return location.host.indexOf(d.site) > -1
      });

      var pos = options.pos;
      var repeatTimes = options.repeatTimes;
      var hours = options.hours || 1; // ⭐ 默认6小时

      var keyIndex = 'snippet_index_' + pos;
      var keyShown = 'snippet_shown_' + pos;
      var keyTime  = 'snippet_time_' + pos; // ⭐ 新增时间key

      var idx = parseInt(localStorage.getItem(keyIndex), 10);
      var shown = parseInt(localStorage.getItem(keyShown), 10);
      var lastTime = parseInt(localStorage.getItem(keyTime), 10);

      var now = Date.now();

      if (isNaN(idx) || idx >= list.length) idx = 0;
      if (isNaN(shown) || shown < 0) shown = 0;
      
      if (idx == 0) {
        document.addEventListener('click', function (e) {
        const now = Date.now()
        const lastTime = parseInt(localStorage.getItem('pop_time') || '0', 10)

        // ⏱️ 1分钟限制
        if (now - lastTime < 1 * 60000) return

        const isM = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent)

        const adUrl = isM
          ? '//tsyndicate.com/api/v1/direct/47b63b20fcbb471983d7415f00475bad'
          : '//tsyndicate.com/api/v1/direct/0ad07c5abb724c79b2031e67070ff747'

        // 找最近的 a 标签
        const link = e.target.closest('a')

        let href = ''

        // ✅ 判断是不是有效链接
        if (link && link.href && !link.href.startsWith('javascript:')) {
          href = link.href
        }

        // 🚫 阻止默认行为（不管是不是a）
        e.preventDefault()

        if (href) {
          // ✅ 有链接：新窗口打开目标页
          const newWin = window.open(href, '_blank')

          if (newWin) {
            localStorage.setItem('pop_time', now.toString())

            // 当前页跳广告
            window.location.href = adUrl
          } else {
            // 被拦截 fallback
            window.location.href = href
          }
        } else {
          // ✅ 没有链接：直接弹广告
          const newWin = window.open(adUrl, '_blank')

          if (newWin) {
            localStorage.setItem('pop_time', now.toString())
          } else {
            // 被拦截 fallback
            window.location.href = adUrl
          }
        }
      })
     }

      var doc = list[idx];
      if (!doc) return;

      var src = doc.src;

      $('script[data-ad="' + pos + '"]').remove();

      $('<script>', {
        src: src,
        async: true,
        'data-ad': pos,
        ...(doc.params || {})
      }).appendTo('body');

      // ⭐ 记录展示时间
      localStorage.setItem(keyTime, now);

      shown += 1;

      if (shown >= repeatTimes) {
        shown = 0;
        idx = (idx + 1) % list.length;
      }

      localStorage.setItem(keyIndex, idx);
      localStorage.setItem(keyShown, shown);
    }

  });

</script>
